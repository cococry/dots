[terminal.shell]
program = "/usr/bin/fish"

[general]
live_config_reload = true

# Font configuration
[font]
normal = { family = "Iosevka Nerd Font", style = "Regular" }
bold = { family = "Iosevka Nerd Font", style = "Bold" }
italic = { family = "Iosevka Nerd Font", style = "Italic" }
bold_italic = { family = "Iosevka Nerd Font", style = "Bold Italic" }
size = 14

# Window padding
[window]
padding = { x = 10, y = 10 }
decorations = "Full"
opacity = 1.0

[colors.primary]
background = "#000000"
foreground = "#d8d8d8"
dim_foreground = "#b8b8b8"
bright_foreground = "#f0f0f0"

[colors.cursor]
text = "#101010"
cursor = "#d8d8d8"

[colors.vi_mode_cursor]
text = "#101010"
cursor = "#e0e0e0"

[colors.selection]
text = "#101010"
background = "#c8c8c8"

[colors.search.matches]
foreground = "#101010"
background = "#b8b8b8"

[colors.search.focused_match]
foreground = "#101010"
background = "#e0e0e0"

[colors.hints.start]
foreground = "#101010"
background = "#d8d8d8"

[colors.hints.end]
foreground = "#101010"
background = "#707070"

[colors.footer_bar]
background = "#202020"
foreground = "#d8d8d8"

[colors.line_indicator]
foreground = "None"
background = "None"

[colors.normal]
black = "#101010"
red = "#909090"
green = "#a0a0a0"
yellow = "#b0b0b0"
blue = "#9a9a9a"
magenta = "#ababab"
cyan = "#b8b8b8"
white = "#d8d8d8"

[colors.bright]
black = "#505050"
red = "#ababab"
green = "#b8b8b8"
yellow = "#c6c6c6"
blue = "#b8b8b8"
magenta = "#c0c0c0"
cyan = "#d8d8d8"
white = "#f0f0f0"

[colors.dim]
black = "#000000"
red = "#707070"
green = "#707070"
yellow = "#8a8a8a"
blue = "#707070"
magenta = "#8a8a8a"
cyan = "#8a8a8a"
white = "#b8b8b8"
